spring:
  application:
    name: financedash
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financedash}
    username: ${DATABASE_USERNAME:financedash}
    password: ${DATABASE_PASSWORD:financedash}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

