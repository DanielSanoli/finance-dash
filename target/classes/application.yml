spring:
  application:
    name: financedash
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financedash}
    username: ${DATABASE_USERNAME:financedash}
    password: ${DATABASE_PASSWORD:financedash}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: ${SERVER_PORT:8080}

app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  security:
    jwt:
      secret: ${JWT_SECRET:finance-dash-dev-secret-change-me}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  auth:
    login-max-attempts: ${AUTH_LOGIN_MAX_ATTEMPTS:5}
    login-window-minutes: ${AUTH_LOGIN_WINDOW_MINUTES:15}
    password-reset-expiration-hours: ${AUTH_PASSWORD_RESET_EXPIRATION_HOURS:2}
    email-verification-expiration-hours: ${AUTH_EMAIL_VERIFICATION_EXPIRATION_HOURS:48}
    refresh-token-expiration-days: ${AUTH_REFRESH_TOKEN_EXPIRATION_DAYS:30}
  asaas:
    enabled: ${ASAAS_ENABLED:false}
    api-key: ${ASAAS_API_KEY:}
    base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
    webhook-token: ${ASAAS_WEBHOOK_TOKEN:}
    pro-plan-value: ${ASAAS_PRO_PLAN_VALUE:29.90}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@financedash.com}
    host: ${SPRING_MAIL_HOST:}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
  radar:
    timezone: ${RADAR_TIMEZONE:America/Sao_Paulo}
    alerts-cron: ${RADAR_ALERTS_CRON:0 0 8 * * *}
    digest-cron: ${RADAR_DIGEST_CRON:0 0 9 * * MON}
    digest:
      enabled: ${RADAR_DIGEST_ENABLED:true}
    ai:
      enabled: ${RADAR_AI_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

