spring:
  datasource:
    url: jdbc:h2:mem:financedash;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: test-disabled

app:
  security:
    jwt:
      secret: test-secret-key-for-integration-tests
      expiration-seconds: 3600
  asaas:
    enabled: false
  mail:
    enabled: false
  radar:
    ai:
      enabled: false
    digest:
      enabled: false
